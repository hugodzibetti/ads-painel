version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ads-painel-app
    environment:
      - NODE_ENV=production
      - DB_PATH=./data/app.db
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - OPENCODE_BASE_URL=${OPENCODE_BASE_URL:-https://opencode.ai/zen/go/v1}
      - OPENCODE_MODEL=${OPENCODE_MODEL:-deepseek-v4-flash}
      - WHATSAPP_GROUP_ID_ALUNOS=${WHATSAPP_GROUP_ID_ALUNOS}
      - WHATSAPP_GROUP_ID_PROFS=${WHATSAPP_GROUP_ID_PROFS}
    volumes:
      - ./data:/app/data
      - whatsapp-auth:/app/.wwebjs_cache
    env_file:
      - .env
    restart: unless-stopped

volumes:
  whatsapp-auth:
    driver: local

networks:
  default:
    name: ads-painel-network
