services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    env_file: .env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file: .env
    volumes:
      - ./data:/app/data
      - wwebjs_auth:/app/bot/.wwebjs_auth
    shm_size: "1gb"
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  wwebjs_auth:
